<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarketPrice</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        width: 320px;
        min-height: 400px;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0a0f;
        color: #e4e4e7;
        overflow: hidden;
      }

      /* Header */
      .header {
        padding: 20px 20px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #1a1a26;
      }
      .header .logo {
        width: 28px;
        height: 28px;
        background: linear-gradient(135deg, #22c55e, #16a34a);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        font-weight: 700;
        color: #fff;
      }
      .header h1 {
        font-size: 16px;
        font-weight: 700;
        color: #fafafa;
        letter-spacing: -0.02em;
      }
      .header h1 span { color: #22c55e; }

      /* Status bar */
      .status-bar {
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #12121a;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3f3f46;
      }
      .status-dot.active {
        background: #22c55e;
        animation: pulse 2s infinite;
      }
      .status-dot.paused {
        background: #f59e0b;
      }
      .status-dot.inactive {
        background: #ef4444;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
        50% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
      }
      .status-text {
        font-size: 12px;
        color: #a1a1aa;
        font-weight: 500;
      }

      /* Capture mode */
      .capture-mode {
        padding: 8px 20px;
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        background: #12121a;
        border-bottom: 1px solid #1a1a26;
      }

      /* Stats */
      .stats {
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        gap: 12px;
      }
      .stat-card {
        background: #12121a;
        border: 1px solid #1a1a26;
        border-radius: 10px;
        padding: 14px 12px;
        text-align: center;
      }
      .stat-value {
        font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
        font-size: 22px;
        font-weight: 700;
        color: #fafafa;
        line-height: 1;
        margin-bottom: 6px;
      }
      .stat-label {
        font-size: 10px;
        color: #71717a;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 600;
      }

      /* Buttons */
      .actions {
        padding: 0 20px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .btn {
        width: 100%;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn:hover { transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: #fff;
      }
      .btn-primary:hover { box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); }
      .btn-secondary {
        background: #1a1a26;
        color: #a1a1aa;
        border: 1px solid #27272a;
      }
      .btn-secondary:hover { background: #27272a; color: #e4e4e7; }
      .btn-danger {
        background: transparent;
        color: #71717a;
        font-size: 12px;
      }
      .btn-danger:hover { color: #ef4444; }

      .btn-row {
        display: flex;
        gap: 8px;
      }
      .btn-row .btn { flex: 1; }

      /* Login section */
      .login-section {
        padding: 24px 20px;
      }
      .login-section p {
        font-size: 13px;
        color: #71717a;
        margin-bottom: 16px;
        line-height: 1.5;
      }
      .input-group {
        margin-bottom: 12px;
      }
      .input-group label {
        display: block;
        font-size: 11px;
        color: #a1a1aa;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 6px;
      }
      .input-group input {
        width: 100%;
        padding: 10px 12px;
        background: #12121a;
        border: 1px solid #27272a;
        border-radius: 8px;
        color: #fafafa;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }
      .input-group input:focus {
        border-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.15);
      }
      .input-group input::placeholder { color: #3f3f46; }
      .login-error {
        color: #ef4444;
        font-size: 12px;
        margin-bottom: 12px;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="logo">M</div>
      <h1>Market<span>Price</span></h1>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="login-section" style="display: none;">
      <p>Faca login para comecar a capturar anuncios do Marketplace.</p>
      <form id="login-form">
        <div class="input-group">
          <label for="input-email">Email</label>
          <input type="email" id="input-email" placeholder="seu@email.com" required />
        </div>
        <div class="input-group">
          <label for="input-password">Senha</label>
          <input type="password" id="input-password" placeholder="••••••" required />
        </div>
        <div id="login-error" class="login-error"></div>
        <button type="submit" id="btn-login" class="btn btn-primary">Entrar</button>
      </form>
    </div>

    <!-- Dashboard Section -->
    <div id="dash-section" style="display: none;">
      <!-- Status Bar -->
      <div class="status-bar">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text" class="status-text">Verificando...</span>
      </div>

      <!-- Capture Mode Indicator -->
      <div id="capture-mode" class="capture-mode" style="display: none;"></div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-card">
          <div id="stat-captured" class="stat-value">0</div>
          <div class="stat-label">Salvos</div>
        </div>
        <div class="stat-card">
          <div id="stat-duplicates" class="stat-value">0</div>
          <div class="stat-label">Duplicados</div>
        </div>
        <div class="stat-card">
          <div id="stat-outliers" class="stat-value">0</div>
          <div class="stat-label">Outliers</div>
        </div>
        <div class="stat-card">
          <div id="stat-deep" class="stat-value">0</div>
          <div class="stat-label">Profundas</div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="btn-dashboard" class="btn btn-primary">Abrir Dashboard</button>
        <div class="btn-row">
          <button id="btn-pause" class="btn btn-secondary">Pausar</button>
          <button id="btn-logout" class="btn btn-danger">Sair</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
